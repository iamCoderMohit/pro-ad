<div class="px-20">
  <h1 class="font-bold mb-5 text-lg">Page Details</h1>
  @if (loading()) {
    <div>
      <app-loading [isBlack]="true"></app-loading>
    </div>
  } @else {
    <app-page-card
      [name]="page().name"
      [category]="page().category"
      [isHome]="true"
      [id]="page().id"
    ></app-page-card>
  }

  <div class="flex justify-between items-center mb-5 mt-10">
    <h1 class="font-bold text-lg">Active campaigns</h1>
    <button class="bg-black text-white px-4 py-1 cursor-pointer" (click)="createCampaign()">
      Create new
    </button>
  </div>

  @if(camp().length === 0) {
    <div class="mt-10"> 
      <i>No campaigns found, create one.</i>
    </div>
  } @else {
    <div class="mb-5">
      <i>click on any campaign for more details</i>
    </div>
      <div *ngIf="camp() && camp().length > 0" class="flex flex-col gap-5">
    <div class="flex justify-between px-4 font-bold">
      <h1 class="w-1/5">Name</h1>
      <h1 class="w-1/5">Type</h1>
      <h1 class="w-1/5">Budget</h1>
      <h1 class="w-1/5">Spent</h1>
      <h1 class="w-1/5">Remaining</h1>
    </div>
    @if (loading()) {
      <div>
        <app-loading [isBlack]="true"></app-loading>
      </div>
    } @else {
      <div *ngFor="let camp of camp()">
        <app-campaign-detail
          [id]="camp.id"
          [name]="camp.name"
          [type]="camp.budget_type"
          [amount]="camp.budget_amount"
          [spent]="camp.amount_spent"
          [remaining]="camp.remaining_budget || camp.budget_amount"
          [pageId]="page().id"
        ></app-campaign-detail>
      </div>
    }
  </div>
  }

  @if(errMsg()) {
    <app-error [error]="errMsg()"></app-error>
  }
</div>
